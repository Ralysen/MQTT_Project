# NanoMQ configuration
# Equivalent to the previous Mosquitto setup:
#   - Port 1883 (TCP, internal Docker network only — used by the app service)
#   - Port 8883 (TLS 1.2, public — used by the ESP32 device)
#   - Username/password auth, no client certificates required
#
# Credentials must match MQTT_USERNAME / MQTT_PASSWORD in .env

listeners.tcp {
  bind = "0.0.0.0:1883"
}

listeners.ssl {
  bind = "0.0.0.0:8883"
  keyfile  = "/etc/nanomq/certs/privkey.pem"
  certfile = "/etc/nanomq/certs/fullchain.pem"
  # Device uses authmode=0 — server does not request a client certificate
  verify_peer        = false
  fail_if_no_peer_cert = false
}

authorization {
  no_match    = deny
  deny_action = disconnect

  sources = [
    {
      type   = simple
      enable = true
      users  = [
        {
          username = "Radek"
          password = "Qwerty1@"
        }
      ]
    }
  ]
}

# Built-in REST management API — bound to localhost inside the container
# Access via: curl http://localhost:8081/api/v4/brokers -u admin:changeme
http_server {
  port      = 8081
  limit_conn = 32
  username  = "admin"
  password  = "changeme"
  auth_type = basic
}

log {
  to    = [file, console]
  level = warn
  dir   = "/var/log/nanomq"
  file  = "nanomq.log"
}
